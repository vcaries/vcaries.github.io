# Navigation — Français (langue par défaut)
#   Les liens en `#xxx` pointent vers une section de la page d'accueil (À propos,
#   Compétences, Contact). Les liens en `/xxx/` pointent vers une page dédiée
#   (Publications, Conférences, Enseignement) — c'est ce qui garde l'accueil court.
#   NB : l'entrée « Projets » a été retirée tant que la section n'est pas publiée.
#   Pour la remettre (page dédiée), ajoute :
#     - name: Projets
#       url: '/project/'
#       weight: 35

main:
  - name: À propos
    url: '#about'
    weight: 10
  - name: Compétences
    url: '#skills'
    weight: 20
  - name: Publications
    url: '/publication/'
    weight: 30
  - name: Conférences
    url: '/event/'
    weight: 40
  - name: Enseignement
    url: '/teaching/'
    weight: 50
  - name: Contact
    url: '#contact'
    weight: 60
  # Lien direct vers le CV (PDF dans static/uploads/resume.pdf)
#  - name: CV
